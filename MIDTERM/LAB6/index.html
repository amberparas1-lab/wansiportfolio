<!DOCTYPE html>
<html>
<head>
<title>Display GUGOL</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
background:white;
padding:20px;
margin-bottom:30px;
width:400px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.textbox{
display:block;
margin-bottom:10px;
padding:8px;
width:95%;
}

.inline-box{
display:inline-block;
vertical-align:middle;
margin-right:10px;
}

button{
padding:6px 12px;
}

.google{
text-align:center;
margin-top:20px;
}

.google img{
width:200px;
margin-bottom:10px;
}

.signup input{
display:block;
margin-bottom:10px;
padding:8px;
width:95%;
}

.signup button{
background:#4a7dfc;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
}

.uber input{
display:block;
margin-bottom:10px;
padding:10px;
width:95%;
}

.uber button{
padding:10px;
margin-right:5px;
border:none;
}

.black{
background:black;
color:white;
}

.gray{
background:#ddd;
}

</style>

</head>

<body>

<div class="container">
<input class="textbox" type="text" placeholder="Name">
<input class="textbox" type="text" placeholder="Email">
</div>

<div class="container">

<p class="inline-box">
Thanks for chatting with our customer support.
Would you like to take our quick survey?
</p>
<button class="inline-box">Yes</button>
<button class="inline-box">No</button>
</div>

<div class="container google">
<img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png">
<input class="textbox" type="text"
placeholder="Search Google or type a URL">

</div>

<div class="container signup">
<h3>Sign Up</h3>
<input type="text" placeholder="First name">
<input type="text" placeholder="Last name">
<input type="text" placeholder="Email">
<button>Sign Up</button>
</div>

<div class="container uber">
<h2>Request a ride now</h2>
<input type="text" placeholder="Enter pickup location">
<input type="text" placeholder="Enter destination">
<button class="black">Request now</button>
<button class="gray">Schedule for later</button>
</div>


</body>
</html>
